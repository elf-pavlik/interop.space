worker_processes 1;

events { worker_connections 1024; }

http {
    # Body-based routing (POST/PUT)
    map $http_content_type $content_backend {
        default "";
        "application/sparql-query"  http://oxigraph:7878/query;
        "application/sparql-update" http://oxigraph:7878/update;
        "application/trig"          http://oxigraph:7878/store;
        "application/n-quads"       http://oxigraph:7878/store;
    }

    # Accept-based routing (GET)
    map $http_accept $accept_backend {
        default                      http://oxigraph:7878/query;
        "~*application/n-quads"      http://oxigraph:7878/store;
        "~*application/trig"         http://oxigraph:7878/store;
    }

    server {
        listen 80;

        location /sparql {
            set $backend $content_backend;

            if ($backend = "") {
                set $backend $accept_backend;
            }

            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://oxigraph:7878/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
